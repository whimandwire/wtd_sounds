<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>What the Dub? Soundboard</title>
    <!-- Include PapaParse to read the CSV file directly -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ff4757;
            --text-color: #ffffff;
            --muted-text: #a4b0be;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            padding-bottom: 80px;
        }

        header h1 {
            font-size: 1.4rem;
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .search-container {
            position: sticky;
            top: 0;
            background-color: var(--bg-color);
            padding: 5px 0 15px 0;
            z-index: 10;
        }

        .search-bar {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #333;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent-color);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background-color: #2ed573;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 100;
            transition: transform 0.3s ease-in-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
        }

        .sound-card {
            background-color: var(--card-bg);
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 75px;
        }

        .sound-card:active {
            transform: scale(0.95);
            background-color: #2a2a2a;
        }

        .sound-text {
            font-size: 0.9rem;
            font-weight: 600;
            word-break: break-word;
            margin-bottom: 4px;
        }

        .sound-meta {
            font-size: 0.65rem;
            color: var(--muted-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            padding: 12px 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .custom-input {
            flex-grow: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 0.95rem;
        }

        .copy-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">Copied to Clipboard!</div>

    <header>
        <h1>DUB HELPER</h1>
    </header>

    <div class="search-container">
        <input type="text" id="searchBar" class="search-bar" placeholder="🔍 Search vibe, show, tag..." autocomplete="off">
    </div>

    <div class="sound-grid" id="soundGrid"></div>

    <div class="footer-bar">
        <input type="text" id="customInput" class="custom-input" placeholder="Type a custom phrase here...">
        <button class="copy-btn" id="copyCustomBtn">Copy</button>
    </div>

    <script>
        let MASTER_SOUNDS = [];
        const grid = document.getElementById('soundGrid');
        const searchBar = document.getElementById('searchBar');

        // 1. Fetch and Parse the CSV File Directly
        function loadCSVData() {
            Papa.parse("Untitled spreadsheet - Sheet1.csv", {
                download: true,
                header: true, // Uses your exact column names
                skipEmptyLines: true,
                complete: function(results) {
                    MASTER_SOUNDS = results.data.filter(row => row['Text to Paste']);
                    renderGrid(MASTER_SOUNDS);
                },
                error: function(err) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:red; padding:20px;">
                        Make sure 'Untitled spreadsheet - Sheet1.csv' is in this same folder!
                    </div>`;
                }
            });
        }

        // 2. Render UI Cards
        function renderGrid(data) {
            grid.innerHTML = '';
            data.forEach(item => {
                // Maps your column layout dynamically
                const phrase = item['Text to Paste'];
                const category = item['Category'] || item['Type'] || '';

                const card = document.createElement('div');
                card.className = 'sound-card';
                card.onclick = () => copyText(phrase);
                
                const textEl = document.createElement('div');
                textEl.className = 'sound-text';
                textEl.textContent = phrase;
                
                const metaEl = document.createElement('div');
                metaEl.className = 'sound-meta';
                metaEl.textContent = category;
                
                card.appendChild(textEl);
                card.appendChild(metaEl);
                grid.appendChild(card);
            });
        }

        // 3. Live Filtering Search Logic
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                renderGrid(MASTER_SOUNDS);
                return;
            }
            const filtered = MASTER_SOUNDS.filter(item => {
                const text = (item['Text to Paste'] || '').toLowerCase();
                const keywords = (item['Vibe / Keywords'] || '').toLowerCase();
                const category = (item['Category'] || '').toLowerCase();
                return text.includes(query) || keywords.includes(query) || category.includes(query);
            });
            renderGrid(filtered);
        });

        // 4. Clipboard Copy Routines
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1500);
            });
        }

        document.getElementById('copyCustomBtn').onclick = () => {
            const val = document.getElementById('customInput').value.trim();
            if (val) copyText(val);
        };

        window.onload = loadCSVData;
    </script>
</body>
</html>
