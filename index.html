<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>What the Dub? Soundboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ff4757;
            --text-color: #ffffff;
            --muted-text: #a4b0be;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            padding-bottom: 90px; /* Space for the persistent input bar */
        }

        header h1 { font-size: 1.4rem; text-align: center; color: var(--accent-color); margin-bottom: 10px; }

        .search-container { position: sticky; top: 0; background-color: var(--bg-color); padding: 5px 0 15px 0; z-index: 10; }
        .search-bar { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #333; background-color: var(--card-bg); color: var(--text-color); font-size: 1rem; outline: none; }
        .search-bar:focus { border-color: var(--accent-color); }

        .sound-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .sound-card { 
            background-color: var(--card-bg); border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 8px; 
            text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 75px; 
        }
        .sound-card:active { transform: scale(0.95); background-color: #2a2a2a; }
        .sound-text { font-size: 0.9rem; font-weight: 600; word-break: break-word; margin-bottom: 4px; }
        .sound-meta { font-size: 0.65rem; color: var(--muted-text); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Persistent Bottom Bar */
        .footer-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background-color: var(--card-bg); 
            padding: 12px 15px; border-top: 1px solid #333; display: flex; gap: 10px; box-shadow: 0 -4px 15px rgba(0,0,0,0.5); z-index: 20;
        }
        .custom-input { flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background-color: var(--bg-color); color: var(--text-color); font-size: 1rem; }
        .copy-btn { background-color: #2ed573; color: white; border: none; padding: 0 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header><h1>DUB HELPER</h1></header>

    <div class="search-container">
        <input type="text" id="searchBar" class="search-bar" placeholder="🔍 Search sounds or tags..." autocomplete="off">
    </div>

    <div class="sound-grid" id="soundGrid"></div>

    <div class="footer-bar">
        <input type="text" id="customInput" class="custom-input" placeholder="Your final text..." autocomplete="off">
        <button class="copy-btn" id="copyAllBtn">Copy</button>
    </div>

    <script>
        let MASTER_SOUNDS = [];
        const grid = document.getElementById('soundGrid');
        const searchBar = document.getElementById('searchBar');
        const customInput = document.getElementById('customInput');

        // 1. Pull dynamically from your Google Sheet CSV link
        function loadSheetData() {
            const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQgPRFxM2ZRPkuL0uLRkDnhbtP44ZSo-z-VGJsMrlvBZlAEqd32KSaaS5ZnwVgbWumfu1Wzo3BzzAu/pub?gid=0&single=true&output=csv";
            
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    MASTER_SOUNDS = results.data.filter(row => row['Text to Paste']);
                    renderGrid(MASTER_SOUNDS);
                }
            });
        }

        // 2. Insert text at cursor position in the input box
        function insertAtCursor(text) {
            const input = customInput;
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const val = input.value;
            
            // Insert the sound text with a trailing space for convenience
            input.value = val.substring(0, start) + text + " " + val.substring(end);
            
            // Move cursor to end of the newly inserted text
            input.focus();
            const newPos = start + text.length + 1;
            input.setSelectionRange(newPos, newPos);
        }

        function renderGrid(data) {
            grid.innerHTML = '';
            data.forEach(item => {
                const phrase = item['Text to Paste'];
                const card = document.createElement('div');
                card.className = 'sound-card';
                card.onclick = () => insertAtCursor(phrase);
                
                card.innerHTML = `
                    <div class="sound-text">${phrase}</div>
                    <div class="sound-meta">${item['Category'] || ''}</div>
                `;
                grid.appendChild(card);
            });
        }

        // 3. Search and filter logic
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = MASTER_SOUNDS.filter(item => {
                return (item['Text to Paste'] || '').toLowerCase().includes(query) || 
                       (item['Vibe / Keywords'] || '').toLowerCase().includes(query) || 
                       (item['Category'] || '').toLowerCase().includes(query);
            });
            renderGrid(filtered);
        });

        // 4. Final copy button
        document.getElementById('copyAllBtn').onclick = () => {
            if (customInput.value) {
                navigator.clipboard.writeText(customInput.value.trim());
                customInput.style.borderColor = "#2ed573";
                setTimeout(() => customInput.style.borderColor = "#444", 1000);
            }
        };

        window.onload = loadSheetData;
    </script>
</body>
</html>
